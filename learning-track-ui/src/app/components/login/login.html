<div class="container">

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card">

        <div class="card-header bg-primary text-white">

          Login

        </div>

        <div class="card-body">

          <form
            [formGroup]="loginForm"
            (ngSubmit)="login()">

            <div class="mb-3">

              <label>Email</label>

              <input
                type="email"
                class="form-control"
                formControlName="email">

            </div>

            <div class="mb-3">

              <label>Password</label>

              <input
                type="password"
                class="form-control"
                formControlName="password">

            </div>

            <button
              class="btn btn-primary w-100">

              Login

            </button>

          </form>

          <div
            class="alert alert-danger mt-3"
            *ngIf="errorMessage">

            {{errorMessage}}

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
