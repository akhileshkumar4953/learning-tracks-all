<div class="container">

  <div class="card">

    <div class="card-header bg-success text-white">

      Add Learning Topic

    </div>

    <div class="card-body">

      <form
        [formGroup]="topicForm"
        (ngSubmit)="save()">

        <div class="mb-3">

          <label>Title</label>

          <input
            class="form-control"
            formControlName="title">

        </div>

        <div class="mb-3">

          <label>Category</label>

          <input
            class="form-control"
            formControlName="category">

        </div>

        <div class="row">

          <div class="col-md-6">

            <label>Status</label>

            <select
              class="form-select"
              formControlName="status">

<option value="NOT_STARTED">Not Started</option>
<option value="IN_PROGRESS">In Progress</option>
<option value="COMPLETED">Completed</option>

            </select>

          </div>

          <div class="col-md-6">

            <label>Priority</label>

            <select
              class="form-select"
              formControlName="priority">

              <option>LOW</option>

              <option>MEDIUM</option>

              <option>HIGH</option>

            </select>

          </div>

        </div>

        <div class="mt-3">

          <label>Progress</label>

          <input
            type="number"
            class="form-control"
            formControlName="progress">

        </div>

        <div class="mt-3">

          <label>Notes</label>

          <textarea
            rows="4"
            class="form-control"
            formControlName="notes"></textarea>

        </div>

        <button
          class="btn btn-success mt-4">

          Save Topic

        </button>

      </form>

    </div>

  </div>

</div>
